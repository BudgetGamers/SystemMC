name: Auto-Update Installer Release

on:
  push:
    branches:
      - main  # or 'master' depending on your default branch name
    paths:
      - 'systemMC/installer.lua' # Only runs if this specific file changes

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from lua
        id: get_version
        run: |
          VERSION=$(grep '_VERSION =' systemMC/installer.lua | head -n 1 | cut -d '"' -f 2)
          echo "LUA_VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          # This uses the version from your code as the title
          name: SystemMC version ${{ steps.get_version.outputs.LUA_VERSION }}
          # This uses the version from your code as the tag name
          tag_name: ${{ steps.get_version.outputs.LUA_VERSION }}
          files: systemMC/installer.lua
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
